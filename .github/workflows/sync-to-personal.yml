name: Sync to Personal Repo

on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: ["Sync Facebook Events"]
    types: [completed]
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    if: github.repository == 'material-lab-io/Perhitsiksha-Website'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH deploy key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SYNC_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          printf 'Host github.com\n  IdentityFile ~/.ssh/deploy_key\n  IdentitiesOnly yes\n' > ~/.ssh/config

      - name: Push to personal repo
        # SSH deploy key push triggers deploy.yml on the target repo automatically.
        run: |
          git remote add personal git@github.com:kaushikNaarayan/perhitsiksha-website.git
          git push personal main --force
